name: daily-worldcup-digest

on:
  schedule:
    # 13:00 UTC daily — well before typical WC kickoffs. Adjust as needed.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD). Blank = today."
        required: false
        default: ""

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      # Score yesterday's picks first (best-effort; never fails the run).
      - name: Score yesterday
        continue-on-error: true
        run: python main.py --score "$(date -u -d 'yesterday' +%F)"

      - name: Send today's digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python main.py --date "${{ github.event.inputs.date }}"
          else
            python main.py
          fi

      # Persist the predictions log across runs so scoring works next day.
      - name: Commit predictions log
        if: always()
        run: |
          git config user.name "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add -f predictions.jsonl || true
          git commit -m "predictions: update $(date -u +%F)" || echo "nothing to commit"
          git push || echo "push skipped"
